spring.application.name=ngn

# H2 datasource
spring.datasource.url=jdbc:h2:mem:ngndb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Logging
logging.level.com.gs.ngn=DEBUG

# NASA API
nasa.api.key=DEMO_KEY
nasa.donki.base-url=https://api.nasa.gov/DONKI
nasa.neows.base-url=https://api.nasa.gov/neo/rest/v1

# Scheduler
scheduling.space-monitor.fixed-rate-ms=300000

# SpringDoc / Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# Carregamento de data.sql com JPA (Spring Boot 3+)
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
